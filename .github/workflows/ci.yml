name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    # macOS matches the dev platform and the native modules (better-sqlite3,
    # sqlite-vec) that @cairn/engine depends on.
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            packages/engine/package-lock.json
            apps/desktop/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Engine gates (test:smoke)
        run: cd packages/engine && npm run test:smoke

      - name: Desktop tests
        run: cd apps/desktop && npm test
